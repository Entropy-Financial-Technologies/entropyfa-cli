name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Install cross (aarch64 Linux)
        if: matrix.use_cross
        run: |
          CROSS_VERSION=v0.2.5
          curl -sSfL "https://github.com/cross-rs/cross/releases/download/${CROSS_VERSION}/cross-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/cross.tar.gz
          echo "642375d1bcf3bd88272c32ba90e999f3d983050adf45e66bd2d3887e8e838bad  /tmp/cross.tar.gz" | sha256sum -c
          sudo tar xzf /tmp/cross.tar.gz -C /usr/local/bin
          cross --version
      - name: Build
        run: ${{ matrix.use_cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }} --package entropyfa
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/entropyfa dist/entropyfa-${{ matrix.target }}
          mkdir -p dist/entropyfa-full-${{ matrix.target }}/bin
          mkdir -p dist/entropyfa-full-${{ matrix.target }}/reference
          cp target/${{ matrix.target }}/release/entropyfa dist/entropyfa-full-${{ matrix.target }}/bin/entropyfa
          cp -R reference/. dist/entropyfa-full-${{ matrix.target }}/reference/
          cd dist
          tar czf entropyfa-${{ matrix.target }}.tar.gz entropyfa-${{ matrix.target }}
          tar czf entropyfa-full-${{ matrix.target }}.tar.gz -C entropyfa-full-${{ matrix.target }} bin reference
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: entropyfa-${{ matrix.target }}
          path: dist/entropyfa-${{ matrix.target }}.tar.gz
      - name: Upload full artifact
        uses: actions/upload-artifact@v4
        with:
          name: entropyfa-full-${{ matrix.target }}
          path: dist/entropyfa-full-${{ matrix.target }}.tar.gz

  reference-packs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package reference packs
        run: |
          mkdir -p dist
          tar czf dist/entropyfa-reference-packs-${{ github.ref_name }}.tar.gz reference
      - name: Upload reference packs artifact
        uses: actions/upload-artifact@v4
        with:
          name: entropyfa-reference-packs-${{ github.ref_name }}
          path: dist/entropyfa-reference-packs-${{ github.ref_name }}.tar.gz

  release:
    needs:
      - build
      - reference-packs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
